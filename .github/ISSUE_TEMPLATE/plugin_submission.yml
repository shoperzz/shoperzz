name: 🔌 Plugin Submission
description: Submit a community plugin for the official registry
labels: ['plugin-submission', 'community']

body:

  - type: markdown
    attributes:
      value: |
        ## Submit a Community Plugin
        
        Before submitting, verify that your plugin meets the standards:
        - `shoperzz.plugin.yml` present and complete
        - Test coverage ≥ 80% (webhook handlers at 100%)
        - `README.md` with configuration examples
        - Published on npm under `@shoperzz-community/plugin-[name]`
        - Clean `pnpm audit`

  - type: input
    id: package-name
    attributes:
      label: npm Package Name
      placeholder: '@shoperzz-community/plugin-payment-flutterwave'
    validations:
      required: true

  - type: input
    id: npm-url
    attributes:
      label: npm Link
      placeholder: 'https://www.npmjs.com/package/@shoperzz-community/plugin-...'
    validations:
      required: true

  - type: input
    id: repo-url
    attributes:
      label: GitHub Repository
      placeholder: 'https://github.com/[username]/shoperzz-plugin-...'
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Mobile Money Payment
        - Credit Card Payment
        - Notifications
        - Delivery
        - Analytics
        - Other
    validations:
      required: true

  - type: dropdown
    id: market
    attributes:
      label: Target Market(s)
      multiple: true
      options:
        - Nigeria
        - Kenya
        - Senegal
        - Ivory Coast
        - Ghana
        - Cameroon
        - Tanzania
        - Uganda
        - Morocco
        - All African Markets
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Plugin Description
    validations:
      required: true

  - type: input
    id: coverage
    attributes:
      label: Test Coverage (%)
      placeholder: '87%'
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Compliance Checklist
      options:
        - label: '`shoperzz.plugin.yml` present and complete'
          required: true
        - label: Unit tests present
          required: true
        - label: Webhook handlers 100% tested
          required: true
        - label: README with configuration examples
          required: true
        - label: CHANGELOG.md present
          required: true
        - label: Clean `pnpm audit`
          required: true
        - label: No sensitive data in test fixtures
          required: true
        - label: I commit to maintaining this plugin
          required: true
