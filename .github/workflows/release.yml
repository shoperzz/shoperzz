name: Release

on:
  push:
    branches: [main, develop, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v3
        with: { version: 9.0.0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Changesets orchestrates everything:
      # Case 1 — .changeset/*.md exist on main
      #   → creates a PR "chore(release): version packages"
      # Case 2 — The version PR is merged
      #   → bumps versions, publishes to npm, creates git tags and GitHub Releases
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Discord notification after successful publish
      - name: Notify Discord
        if: steps.changesets.outputs.published == 'true'
        uses: Ilshidur/action-discord@master
        with:
          args: |
            🚀 **New Shoperzz Release Published**
            Packages: ${{ steps.changesets.outputs.publishedPackages }}
            → https://github.com/${{ github.repository }}/releases
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
